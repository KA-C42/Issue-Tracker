name: Test CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        # Docker Hub image
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          # Maps tcp port 5432 on service container to the host
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            backend/package-lock.json

      - name: Run auth schema setup
        env:
          DATABASE_URL: ${{secrets.DB_URL}}
        run: |
          echo "Running 000_create_auth_users.sql"  
          psql $DATABASE_URL -f supabase/ci_setup/000_create_auth_users.sql

      - name: Run DB migrations
        env:
          DATABASE_URL: ${{secrets.DB_URL}}
        run: |
          for file in supabase/migrations/*.sql; do
            echo "Running $file"
            psql $DATABASE_URL -f "$file"
          done

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix frontend
          npm ci --prefix backend

      - name: Backend Vitest
        env:
          DATABASE_URL: ${{ secrets.DB_URL }}
          SUPABASE_AUTH_SECRET: ${{ secrets.JWT_SECRET }}
        run: npm run test --prefix backend

      - name: Frontend Vitest
        run: npm run test:ui --prefix frontend

      - name: Playwright e2e
        env:
          DATABASE_URL: ${{ secrets.DB_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          working-directory: frontend
        run: |
          npx playwright install --with-deps
          npm run test:e2e

